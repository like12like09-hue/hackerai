name: Build HackerAI APK

on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Java (For Android Studio)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust (For Tauri Backend)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Project Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Inject Secure Environment Variables
        run: |
          echo "GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.GEMINI_KEY }}" >> .env
          echo "E2B_API_KEY=${{ secrets.E2B_KEY }}" >> .env
          echo "NEXT_PUBLIC_CONVEX_URL=${{ secrets.CONVEX_URL }}" >> .env
          echo "WORKOS_CLIENT_ID=${{ secrets.WORKOS_CLIENT }}" >> .env
          echo "WORKOS_API_KEY=${{ secrets.WORKOS_API }}" >> .env

      - name: Install Tauri CLI Globally
        run: npm install -g @tauri-apps/cli

      - name: Initialize and Build Android APK
        working-directory: ./packages/desktop
        run: |
          tauri android init
          tauri android build --debug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: HackerAI-Android-App
          path: packages/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
